<!DOCTYPE html>
<html>
<head>
  <title>Blend The Vision</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      cursor: none;
    }

    body {
      height: 100vh;
      overflow: hidden;
      background: black;
      color: white;
      font-family: "Courier New", monospace;
    }

    /* CUSTOM CURSOR */
    .cursor {
      width: 14px;
      height: 14px;
      border: 1px solid white;
      border-radius: 50%;
      position: fixed;
      pointer-events: none;
      transform: translate(-50%, -50%);
      z-index: 9999;
    }

    /* SLIDER */
    .slider {
      position: absolute;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    .slide {
      position: absolute;
      width: 110%;
      height: 110%;
      object-fit: cover;
      opacity: 0;
      transform: scale(1.1) rotate(0deg);
      transition: opacity 3s ease, transform 6s ease;
      filter: contrast(110%) brightness(90%);
    }

    .active {
      opacity: 1;
      transform: scale(1) rotate(0.5deg);
    }

    /* GRAIN */
    .grain {
      position: absolute;
      width: 200%;
      height: 200%;
      background: url('https://grainy-gradients.vercel.app/noise.svg');
      opacity: 0.12;
      animation: grainMove 1s steps(2) infinite;
    }

    @keyframes grainMove {
      0% { transform: translate(0,0); }
      50% { transform: translate(-5%, 5%); }
      100% { transform: translate(5%, -5%); }
    }

    /* FLOATING MENU */
    .menu {
      position: absolute;
      right: 5%;
      top: 20%;
      display: flex;
      flex-direction: column;
      gap: 40px;
      text-align: right;
    }

    h1 {
      font-size: 24px;
      letter-spacing: 4px;
      margin-bottom: 40px;
    }

    .nav-item {
      font-size: 14px;
      transition: 0.3s;
      position: relative;
    }

    .nav-item:hover {
      transform: translateX(-10px) skewX(-10deg);
      opacity: 0.6;
    }

    .nav-item a {
      color: white;
      text-decoration: none;
    }

    /* DROPDOWN */
    .dropdown {
      max-height: 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 10px;
      transition: max-height 0.5s ease;
      font-size: 12px;
    }

    .dropdown.open {
      max-height: 300px;
    }

    .dropdown a {
      opacity: 0.5;
    }

    .dropdown a:hover {
      opacity: 1;
    }

    /* GLITCH TEXT */
    .glitch:hover {
      animation: glitch 0.3s infinite;
    }

    @keyframes glitch {
      0% { transform: translate(0); }
      20% { transform: translate(-2px, 2px); }
      40% { transform: translate(2px, -2px); }
      60% { transform: translate(-2px, -2px); }
      80% { transform: translate(2px, 2px); }
      100% { transform: translate(0); }
    }

  </style>
</head>

<body>

<div class="cursor"></div>

<!-- SLIDER -->
<div class="slider">

  <img src="image1.jpg" class="slide active">
  <img src="image2.jpg" class="slide">

  <video class="slide" autoplay muted loop>
    <source src="video1.mp4" type="video/mp4">
  </video>

  <img src="image3.jpg" class="slide">

  <div class="grain"></div>

</div>

<!-- FLOATING MENU -->
<div class="menu">

  <h1>𝙱𝚕𝚎𝚗𝚍 𝚃𝚑𝚎 𝚅𝚒𝚜𝚒𝚘𝚗</h1>

  <div class="nav-item glitch">
    <a href="blend.html">𝚋𝚕𝚎𝚗𝚍 𝚝𝚑𝚎 𝚟𝚒𝚜𝚒𝚘𝚗</a>
  </div>

  <div class="nav-item glitch" onclick="toggleDropdown('curation')">
    𝚌𝚞𝚛𝚊𝚝𝚒𝚘𝚗
    <div class="dropdown" id="curation">
      <a href="https://www.ebay.com/usr/earthscloset">𝚎𝚋𝚊𝚢</a>
      <a href="https://www.depop.com/earthsclosetdepop/">𝚍𝚎𝚙𝚘𝚙</a>
      <a href="https://www.mercari.com/u/earthscloset/">𝚖𝚎𝚛𝚌𝚊𝚛𝚒</a>
      <a href="https://poshmark.com/closet/earths_closet">𝚙𝚘𝚜𝚑𝚖𝚊𝚛𝚔</a>
    </div>
  </div>

  <div class="nav-item glitch" onclick="toggleDropdown('outlets')">
    𝚘𝚞𝚝𝚕𝚎𝚝𝚜
    <div class="dropdown" id="outlets">
      <a href="https://www.instagram.com/earths_closet_shop/">𝚒𝚗𝚜𝚝𝚊𝚐𝚛𝚊𝚖</a>
      <a href="https://tiktok.com/@yourname">𝚝𝚒𝚔𝚝𝚘𝚔</a>
      <a href="https://youtube.com/@yourname">𝚢𝚘𝚞𝚝𝚞𝚋𝚎</a>
      <a href="https://facebook.com/yourname">𝚏𝚊𝚌𝚎𝚋𝚘𝚘𝚔</a>
    </div>
  </div>

</div>

<script>
  // CURSOR
  const cursor = document.querySelector(".cursor");
  document.addEventListener("mousemove", e => {
    cursor.style.left = e.clientX + "px";
    cursor.style.top = e.clientY + "px";
  });

  // SLIDER
  let slides = document.querySelectorAll(".slide");
  let index = 0;

  function showSlide() {
    slides.forEach(s => s.classList.remove("active"));
    slides[index].classList.add("active");
    index = (index + 1) % slides.length;
  }

  setInterval(showSlide, 6000);

  // DROPDOWN
  function toggleDropdown(id) {
    document.getElementById(id).classList.toggle("open");
  }
</script>

</body>
</html>
