<!DOCTYPE html>
<html>
<head>
  <title>Earth's Closet</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Helvetica, Arial, sans-serif;
    }

    body {
      overflow: hidden;
      background: black;
      color: white;
    }

    /* ENTER SCREEN */
    .enter-screen {
      position: fixed;
      inset: 0;
      background: black;
      z-index: 999;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 18px;
      transition: opacity 1.2s ease;
    }

    .enter-logo {
      width: 400px;
    }

    .enter-btn {
      font-size: 12px;
      letter-spacing: 4px;
      border: 1px solid white;
      padding: 10px 18px;
      cursor: pointer;
    }

    .hidden {
      opacity: 0;
      pointer-events: none;
    }

    /* SLIDES */
    .slider {
      position: fixed;
      inset: 0;
      z-index: 1;
    }

    .slide {
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 2s ease;
    }

    .slide.active {
      opacity: 1;
      z-index: 2;
    }

    .slide img,
    .slide video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* OVERLAY */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 2;
    }

    /* BRAND (TOP LEFT NOW VISIBLE) */
    .brand {
      position: fixed;
      top: 35px;
      left: 45px;
      z-index: 3;
      font-size: 18px;
      letter-spacing: 6px;
      text-transform: uppercase;
    }

    /* BLEND (BIGGER) */
    .blend {
      position: fixed;
      top: 35px;
      right: 45px;
      z-index: 3;
      font-size: 13px; /* increased */
      letter-spacing: 5px;
    }

    /* NAV */
    .nav {
      position: fixed;
      top: 80px;
      right: 45px;
      z-index: 3;
      display: flex;
      flex-direction: column;
      gap: 18px;
      text-align: right;
      font-size: 12px;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    .item {
      cursor: pointer;
    }

    /* ADD DROPDOWN ARROWS */
    .item::after {
      content: " ▾";
      opacity: 0.6;
    }

    /* DROPDOWN STYLE */
    .dropdown {
      display: none;
      flex-direction: column;
      gap: 8px;
      margin-top: 10px;
      font-size: 11px;
    }

    .dropdown a {
      color: rgba(255,255,255,0.5); /* greyed */
      transition: 0.3s;
    }

    .dropdown a:hover {
      color: white; /* brighten */
    }

    .open {
      display: flex;
    }

    a {
      color: white;
      text-decoration: none;
    }

    /* CONTROLS */
    .controls {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 5;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .progress-container {
      width: 220px;
      height: 2px;
      background: rgba(255,255,255,0.2);
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: white;
    }

    .buttons {
      display: flex;
      gap: 20px;
      font-size: 18px;
      cursor: pointer;
    }

    .buttons div {
      width: 24px; /* FIXED SIZE */
      text-align: center;
    }

  </style>
</head>

<body>

<div class="enter-screen" id="enter">
  <img src="White_earth_closet_logo-removebg-preview.png" class="enter-logo">
  <div class="enter-btn" onclick="enterSite()">Enter Site</div>
</div>

<div class="slider">

  <div class="slide active">
    <img src="image1 (4).jpg">
  </div>

  <div class="slide">
    <video muted playsinline preload="auto">
      <source src="video1 (2).mp4" type="video/mp4">
    </video>
  </div>

  <div class="slide">
    <img src="image3.jpg">
  </div>

</div>

<div class="overlay"></div>

<div class="brand">Earth’s Closet</div>

<div class="blend">
  <a href="blend.html">Blend The Vision</a>
</div>

<div class="nav">

  <div class="item" onclick="toggle('curation')">
    Curation
    <div class="dropdown" id="curation">
      <a href="https://www.ebay.com/usr/earthscloset">eBay</a>
      <a href="https://www.depop.com/earthsclosetdepop/">Depop</a>
      <a href="https://www.mercari.com/u/earthscloset/">Mercari</a>
      <a href="https://poshmark.com/closet/earths_closet">Poshmark</a>
    </div>
  </div>

  <div class="item" onclick="toggle('outlets')">
    Outlets
    <div class="dropdown" id="outlets">
      <a href="https://www.instagram.com/earths_closet_shop/">Instagram</a>
      <a href="https://tiktok.com/@yourname">TikTok</a>
      <a href="https://youtube.com/@yourname">YouTube</a>
      <a href="https://facebook.com/yourname">Facebook</a>
    </div>
  </div>

</div>

<div class="controls">

  <div class="buttons">
    <div onclick="prevSlide()">&#8592;</div>
    <div onclick="togglePlay()" id="playBtn">⏸</div>
    <div onclick="nextSlide()">&#8594;</div>
  </div>

  <div class="progress-container">
    <div class="progress-bar" id="progress"></div>
  </div>

</div>

<script>
  function enterSite() {
    document.getElementById("enter").classList.add("hidden");
    showSlide(0);
  }

  let slides = document.querySelectorAll(".slide");
  let current = 0;
  let progress = document.getElementById("progress");
  let timer;
  let playing = true;
  let startTime;
  let remaining = 0;

  function showSlide(index) {

    clearTimeout(timer);

    let prevVideo = slides[current].querySelector("video");
    if (prevVideo) {
      prevVideo.pause();
      prevVideo.currentTime = 0;
    }

    slides[current].classList.remove("active");
    current = index;
    slides[current].classList.add("active");

    let video = slides[current].querySelector("video");

    let duration = video && video.duration ? video.duration : 10;
    remaining = duration * 1000;

    startProgress(duration);

    if (video) video.play();

    startTime = Date.now();

    timer = setTimeout(nextSlide, remaining);
  }

  function startProgress(duration) {
    progress.style.transition = "none";
    progress.style.width = "0%";

    setTimeout(() => {
      progress.style.transition = `width ${duration}s linear`;
      progress.style.width = "100%";
    }, 50);
  }

  function nextSlide() {
    showSlide((current + 1) % slides.length);
  }

  function prevSlide() {
    showSlide((current - 1 + slides.length) % slides.length);
  }

  function togglePlay() {
    playing = !playing;

    let video = slides[current].querySelector("video");

    if (!playing) {
      clearTimeout(timer);

      let elapsed = Date.now() - startTime;
      remaining -= elapsed;

      progress.style.transition = "none";
      let percent = (elapsed / (elapsed + remaining)) * 100;
      progress.style.width = percent + "%";

      if (video) video.pause();

    } else {
      startTime = Date.now();

      progress.style.transition = `width ${remaining/1000}s linear`;
      progress.style.width = "100%";

      if (video) video.play();

      timer = setTimeout(nextSlide, remaining);
    }

    document.getElementById("playBtn").textContent = playing ? "⏸" : "▶";
  }

  function toggle(id) {
    document.getElementById(id).classList.toggle("open");
  }
</script>

</body>
</html>
