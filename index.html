<!DOCTYPE html>
<html>
<head>
  <title>Earth's Closet</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Helvetica, Arial, sans-serif;
    }

    body {
      overflow: hidden;
      background: black;
      color: white;
    }

    /* =========================
       ENTER SCREEN (CINEMATIC)
    ========================== */
    .enter-screen {
      position: fixed;
      inset: 0;
      background: black;
      z-index: 999;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 25px;
      transition: opacity 1.2s ease;
    }

    .enter-title {
      font-size: 20px;
      letter-spacing: 6px;
      font-weight: 300;
      text-transform: uppercase;
      opacity: 0.9;
    }

    .enter-btn {
      font-size: 12px;
      letter-spacing: 4px;
      text-transform: uppercase;
      border: 1px solid white;
      padding: 10px 18px;
      cursor: pointer;
      transition: 0.3s;
    }

    .enter-btn:hover {
      opacity: 0.5;
    }

    .hidden {
      opacity: 0;
      pointer-events: none;
    }

    /* =========================
       BACKGROUND SLIDESHOW
    ========================== */
    .slider {
      position: fixed;
      inset: 0;
      z-index: 1;
    }

    .slide {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0;
      transform: scale(1.05);
      transition: opacity 2.5s ease, transform 6s ease;
    }

    .active {
      opacity: 1;
      transform: scale(1);
    }

    /* DARK OVERLAY */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 2;
    }

    /* =========================
       BRAND (TOP LEFT)
    ========================== */
    .brand {
      position: fixed;
      top: 35px;
      left: 45px;
      z-index: 3;
      font-size: 18px;
      letter-spacing: 6px;
      font-weight: 300;
      text-transform: uppercase;
    }

    /* =========================
       BLEND THE VISION (RIGHT SIDE)
    ========================== */
    .blend {
      position: fixed;
      top: 35px;
      right: 45px;
      z-index: 3;
      font-size: 11px;
      letter-spacing: 4px;
      text-transform: uppercase;
      opacity: 0.8;
    }

    .blend a {
      color: white;
      text-decoration: none;
      border-bottom: 1px solid rgba(255,255,255,0.25);
      padding-bottom: 2px;
      transition: 0.3s;
    }

    .blend a:hover {
      opacity: 0.5;
    }

    /* =========================
       NAV (RIGHT SIDE BELOW)
    ========================== */
    .nav {
      position: fixed;
      top: 75px;
      right: 45px;
      z-index: 3;
      display: flex;
      flex-direction: column;
      gap: 22px;
      text-align: right;
      font-size: 12px;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    .item {
      cursor: pointer;
      transition: 0.3s;
    }

    .item:hover {
      opacity: 0.5;
    }

    a {
      color: white;
      text-decoration: none;
    }

    /* DROPDOWNS */
    .dropdown {
      display: none;
      flex-direction: column;
      gap: 10px;
      margin-top: 10px;
      font-size: 11px;
      letter-spacing: 2px;
    }

    .dropdown a {
      opacity: 0.6;
    }

    .dropdown a:hover {
      opacity: 1;
    }

    .open {
      display: flex;
    }

  </style>
</head>

<body>

<!-- ENTER SCREEN -->
<div class="enter-screen" id="enter">
  <div class="enter-title">Earth’s Closet</div>
  <div class="enter-btn" onclick="enterSite()">Enter Site</div>
</div>

<!-- BACKGROUND -->
<div class="slider">
  <img src="image1.jpg" class="slide active">
  <img src="image2.jpg" class="slide">
  <video class="slide" autoplay muted loop>
    <source src="video1.mp4" type="video/mp4">
  </video>
  <img src="image3.jpg" class="slide">
</div>

<div class="overlay"></div>

<!-- BRAND -->
<div class="brand">Earth’s Closet</div>

<!-- BLEND (RIGHT TOP) -->
<div class="blend">
  <a href="blend.html">Blend The Vision</a>
</div>

<!-- NAV (RIGHT SIDE) -->
<div class="nav">

  <div class="item" onclick="toggle('curation')">
    Curation
    <div class="dropdown" id="curation">
      <a href="https://www.ebay.com/usr/earthscloset">eBay</a>
      <a href="https://www.depop.com/earthsclosetdepop/">Depop</a>
      <a href="https://www.mercari.com/u/earthscloset/">Mercari</a>
      <a href="https://poshmark.com/closet/earths_closet">Poshmark</a>
    </div>
  </div>

  <div class="item" onclick="toggle('outlets')">
    Outlets
    <div class="dropdown" id="outlets">
      <a href="https://www.instagram.com/earths_closet_shop/">Instagram</a>
      <a href="https://tiktok.com/@yourname">TikTok</a>
      <a href="https://youtube.com/@yourname">YouTube</a>
      <a href="https://facebook.com/yourname">Facebook</a>
    </div>
  </div>

</div>

<script>
  /* ENTER TRANSITION */
  function enterSite() {
    document.getElementById("enter").classList.add("hidden");
  }

  /* SLIDESHOW */
  let slides = document.querySelectorAll(".slide");
  let i = 0;

  setInterval(() => {
    slides[i].classList.remove("active");
    i = (i + 1) % slides.length;
    slides[i].classList.add("active");
  }, 5500);

  /* DROPDOWNS */
  function toggle(id) {
    document.getElementById(id).classList.toggle("open");
  }
</script>

</body>
</html>
