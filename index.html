<!DOCTYPE html>
<html>
<head>
  <title>Earth's Closet</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Helvetica, Arial, sans-serif;
    }

    body {
      overflow: hidden;
      background: black;
      color: white;
    }

    /* ENTER SCREEN */
    .enter-screen {
      position: fixed;
      inset: 0;
      background: black;
      z-index: 999;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 18px;
      transition: opacity 1.2s ease;
    }

    .enter-logo {
      width: 400px;
      opacity: 0.95;
    }

    .enter-title {
      font-size: 18px;
      letter-spacing: 6px;
      text-transform: uppercase;
    }

    .enter-btn {
      font-size: 12px;
      letter-spacing: 4px;
      border: 1px solid white;
      padding: 10px 18px;
      cursor: pointer;
    }

    .enter-btn:hover {
      opacity: 0.5;
    }

    .hidden {
      opacity: 0;
      pointer-events: none;
    }

    /* SLIDER */
    .slider {
      position: fixed;
      inset: 0;
      z-index: 1;
    }

    .slide {
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 1.5s ease;
    }

    .slide.active {
      opacity: 1;
      z-index: 2;
    }

    .slide img,
    .slide video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* DOTS */
    .dots {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
      z-index: 5;
    }

    .dot {
      width: 8px;
      height: 8px;
      border: 1px solid white;
      border-radius: 50%;
      cursor: pointer;
      opacity: 0.5;
    }

    .dot.active {
      background: white;
      opacity: 1;
    }

    /* OVERLAY */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 2;
    }

    /* BRAND */
    .brand {
      position: fixed;
      top: 35px;
      left: 45px;
      z-index: 3;
      letter-spacing: 6px;
      text-transform: uppercase;
    }

    /* RIGHT SIDE */
    .blend {
      position: fixed;
      top: 35px;
      right: 45px;
      z-index: 3;
      font-size: 11px;
      letter-spacing: 4px;
    }

    .nav {
      position: fixed;
      top: 75px;
      right: 45px;
      z-index: 3;
      display: flex;
      flex-direction: column;
      gap: 20px;
      text-align: right;
    }

    .dropdown {
      display: none;
      flex-direction: column;
      gap: 8px;
      margin-top: 10px;
      font-size: 11px;
    }

    .open {
      display: flex;
    }

    a {
      color: white;
      text-decoration: none;
    }

  </style>
</head>

<body>

<!-- ENTER -->
<div class="enter-screen" id="enter">
  <img src="White_earth_closet_logo-removebg-preview.png" class="enter-logo">
  <div class="enter-title">Earth’s Closet</div>
  <div class="enter-btn" onclick="enterSite()">Enter Site</div>
</div>

<!-- SLIDES -->
<div class="slider">

  <div class="slide active">
    <img src="image1 (4).jpg">
  </div>

  <div class="slide">
    <video muted loop>
      <source src="video1 (2).mp4" type="video/mp4">
    </video>
  </div>

  <div class="slide">
    <img src="image3.jpg">
  </div>

</div>

<!-- DOTS -->
<div class="dots">
  <div class="dot active" onclick="goToSlide(0)"></div>
  <div class="dot" onclick="goToSlide(1)"></div>
  <div class="dot" onclick="goToSlide(2)"></div>
</div>

<div class="overlay"></div>

<div class="brand">Earth’s Closet</div>

<div class="blend">
  <a href="blend.html">Blend The Vision</a>
</div>

<div class="nav">

  <div onclick="toggle('curation')">
    Curation
    <div class="dropdown" id="curation">
      <a href="#">eBay</a>
      <a href="#">Depop</a>
    </div>
  </div>

  <div onclick="toggle('outlets')">
    Outlets
    <div class="dropdown" id="outlets">
      <a href="#">Instagram</a>
      <a href="#">TikTok</a>
    </div>
  </div>

</div>

<script>
  function enterSite() {
    document.getElementById("enter").classList.add("hidden");
  }

  let slides = document.querySelectorAll(".slide");
  let dots = document.querySelectorAll(".dot");
  let current = 0;

  function goToSlide(index) {

    // remove active
    slides[current].classList.remove("active");
    dots[current].classList.remove("active");

    // stop video
    let prevVideo = slides[current].querySelector("video");
    if (prevVideo) {
      prevVideo.pause();
      prevVideo.currentTime = 0;
    }

    current = index;

    slides[current].classList.add("active");
    dots[current].classList.add("active");

    // play video
    let newVideo = slides[current].querySelector("video");
    if (newVideo) {
      newVideo.play();
    }
  }

  function toggle(id) {
    document.getElementById(id).classList.toggle("open");
  }
</script>

</body>
</html>
</body>
</html>
