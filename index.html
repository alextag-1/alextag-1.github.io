<!DOCTYPE html>
<html>
<head>
  <title>Blend The Vision</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      cursor: none;
    }

    body {
      height: 100vh;
      overflow: hidden;
      background: black;
      color: white;
      font-family: Helvetica, Arial, sans-serif;
    }

    /* CUSTOM CURSOR */
    .cursor {
      width: 12px;
      height: 12px;
      border: 1px solid white;
      border-radius: 50%;
      position: fixed;
      pointer-events: none;
      transform: translate(-50%, -50%);
      z-index: 9999;
    }

    /* LEFT MEDIA SLIDER */
    .slider {
      position: absolute;
      width: 75%;
      height: 100%;
      overflow: hidden;
    }

    .slide {
      position: absolute;
      width: 110%;
      height: 110%;
      object-fit: cover;
      opacity: 0;
      transition: opacity 2.5s ease;
    }

    .active {
      opacity: 1;
    }

    /* RIGHT MENU */
    .menu {
      position: absolute;
      right: 5%;
      top: 20%;
      display: flex;
      flex-direction: column;
      gap: 45px;
      text-align: right;
    }

    h1 {
      font-size: 22px;
      letter-spacing: 5px;
      font-weight: 300;
      text-transform: uppercase;
      margin-bottom: 20px;
    }

    .nav-item {
      font-size: 14px;
      position: relative;
      transition: 0.3s;
    }

    /* ❌ REMOVED ALL SHAKE / GLITCH HOVER */

    .nav-item a {
      color: white;
      text-decoration: none;
    }

    .nav-item:hover {
      opacity: 0.6;
    }

    /* DROPDOWNS */
    .dropdown {
      max-height: 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 10px;
      font-size: 12px;
      transition: max-height 0.4s ease;
    }

    .dropdown.open {
      max-height: 300px;
    }

    .dropdown a {
      color: white;
      opacity: 0.5;
      text-decoration: none;
    }

    .dropdown a:hover {
      opacity: 1;
    }

    /* GRAIN */
    .grain {
      position: absolute;
      width: 100%;
      height: 100%;
      pointer-events: none;
      opacity: 0.12;
      background-image: url('https://grainy-gradients.vercel.app/noise.svg');
    }

  </style>
</head>

<body>

<div class="cursor"></div>

<!-- MEDIA -->
<div class="slider">

  <img src="image1.jpg" class="slide active">
  <img src="image2.jpg" class="slide">

  <video class="slide" autoplay muted loop>
    <source src="video1.mp4" type="video/mp4">
  </video>

  <img src="image3.jpg" class="slide">

  <div class="grain"></div>

</div>

<!-- MENU -->
<div class="menu">

  <h1>Blend The Vision</h1>

  <div class="nav-item">
    <a href="blend.html">Blend The Vision</a>
  </div>

  <div class="nav-item" onclick="toggleDropdown('curation')">
    Curation
    <div class="dropdown" id="curation">
      <a href="https://www.ebay.com/usr/earthscloset">eBay</a>
      <a href="https://www.depop.com/earthsclosetdepop/">Depop</a>
      <a href="https://www.mercari.com/u/earthscloset/">Mercari</a>
      <a href="https://poshmark.com/closet/earths_closet">Poshmark</a>
    </div>
  </div>

  <div class="nav-item" onclick="toggleDropdown('outlets')">
    Outlets
    <div class="dropdown" id="outlets">
      <a href="https://www.instagram.com/earths_closet_shop/">Instagram</a>
      <a href="https://tiktok.com/@yourname">TikTok</a>
      <a href="https://youtube.com/@yourname">YouTube</a>
      <a href="https://facebook.com/yourname">Facebook</a>
    </div>
  </div>

</div>

<script>
  // CURSOR
  const cursor = document.querySelector(".cursor");

  document.addEventListener("mousemove", (e) => {
    cursor.style.left = e.clientX + "px";
    cursor.style.top = e.clientY + "px";
  });

  // SLIDER
  let slides = document.querySelectorAll(".slide");
  let index = 0;

  function showSlide() {
    slides.forEach(s => s.classList.remove("active"));
    slides[index].classList.add("active");
    index = (index + 1) % slides.length;
  }

  setInterval(showSlide, 5000);

  // DROPDOWN
  function toggleDropdown(id) {
    document.getElementById(id).classList.toggle("open");
  }
</script>

</body>
</html>
