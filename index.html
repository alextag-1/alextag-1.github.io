<!DOCTYPE html>
<html>
<head>
  <title>Earth's Closet</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Helvetica, Arial, sans-serif;
    }

    body {
      overflow: hidden;
      background: black;
      color: white;
    }

    /* ENTER SCREEN */
    .enter-screen {
      position: fixed;
      inset: 0;
      background: black;
      z-index: 999;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 18px;
      transition: opacity 1.2s ease;
    }

    .enter-logo {
      width: 400px;
    }

    .enter-btn {
      font-size: 12px;
      letter-spacing: 4px;
      border: 1px solid white;
      padding: 10px 18px;
      cursor: pointer;
    }

    .hidden {
      opacity: 0;
      pointer-events: none;
    }

    /* SLIDES */
    .slider {
      position: fixed;
      inset: 0;
      z-index: 1;
    }

    .slide {
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 1.8s ease;
    }

    .slide.active {
      opacity: 1;
      z-index: 2;
    }

    .slide img,
    .slide video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* OVERLAY */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 2;
    }

    /* BRAND */
    .brand {
      position: fixed;
      top: 35px;
      left: 45px;
      z-index: 3;
      letter-spacing: 6px;
      text-transform: uppercase;
    }

    .blend {
      position: fixed;
      top: 35px;
      right: 45px;
      z-index: 3;
      font-size: 11px;
      letter-spacing: 4px;
    }

    /* NAV */
    .nav {
      position: fixed;
      top: 75px;
      right: 45px;
      z-index: 3;
      display: flex;
      flex-direction: column;
      gap: 18px;
      text-align: right;
    }

    .dropdown {
      display: none;
      flex-direction: column;
      gap: 8px;
      margin-top: 10px;
      font-size: 11px;
    }

    .open {
      display: flex;
    }

    a {
      color: white;
      text-decoration: none;
    }

    /* CONTROLS */
    .controls {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 5;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .progress-container {
      width: 220px;
      height: 2px;
      background: rgba(255,255,255,0.2);
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: white;
    }

    .buttons {
      display: flex;
      align-items: center;
      gap: 20px;
      font-size: 18px;
      cursor: pointer;
      user-select: none;
    }

    .btn {
      opacity: 0.7;
      transition: 0.3s;
    }

    .btn:hover {
      opacity: 1;
    }

  </style>
</head>

<body>

<!-- ENTER -->
<div class="enter-screen" id="enter">
  <img src="White_earth_closet_logo-removebg-preview.png" class="enter-logo">
  <div class="enter-btn" onclick="enterSite()">Enter Site</div>
</div>

<!-- SLIDES -->
<div class="slider">

  <div class="slide active">
    <img src="image1 (4).jpg">
  </div>

  <div class="slide">
    <video muted>
      <source src="video1 (2).mp4" type="video/mp4">
    </video>
  </div>

  <div class="slide">
    <img src="image3.jpg">
  </div>

</div>

<div class="overlay"></div>

<div class="brand">Earth’s Closet</div>

<div class="blend">
  <a href="blend.html">Blend The Vision</a>
</div>

<!-- CONTROLS -->
<div class="controls">

  <div class="buttons">
    <div class="btn" onclick="prevSlide()">&#8592;</div>
    <div class="btn" onclick="togglePlay()" id="playBtn">⏸</div>
    <div class="btn" onclick="nextSlide()">&#8594;</div>
  </div>

  <div class="progress-container">
    <div class="progress-bar" id="progress"></div>
  </div>

</div>

<script>
  function enterSite() {
    document.getElementById("enter").classList.add("hidden");
    startSlider();
  }

  let slides = document.querySelectorAll(".slide");
  let current = 0;
  let progress = document.getElementById("progress");
  let timer;
  let playing = true;

  function showSlide(index) {

    let prevVideo = slides[current].querySelector("video");
    if (prevVideo) {
      prevVideo.pause();
      prevVideo.currentTime = 0;
    }

    slides[current].classList.remove("active");
    current = index;
    slides[current].classList.add("active");

    clearTimeout(timer);

    let video = slides[current].querySelector("video");

    progress.style.transition = "none";
    progress.style.width = "0%";

    setTimeout(() => {

      if (!playing) return;

      if (video) {
        video.onloadedmetadata = () => {
          let duration = video.duration;

          progress.style.transition = `width ${duration}s linear`;
          progress.style.width = "100%";

          video.play();

          timer = setTimeout(nextSlide, duration * 1000);
        };

      } else {
        let duration = 10;

        progress.style.transition = `width ${duration}s linear`;
        progress.style.width = "100%";

        timer = setTimeout(nextSlide, duration * 1000);
      }

    }, 50);
  }

  function nextSlide() {
    showSlide((current + 1) % slides.length);
  }

  function prevSlide() {
    showSlide((current - 1 + slides.length) % slides.length);
  }

  function togglePlay() {
    playing = !playing;
    document.getElementById("playBtn").innerText = playing ? "⏸" : "▶";

    let video = slides[current].querySelector("video");

    if (playing) {
      showSlide(current);
    } else {
      clearTimeout(timer);
      progress.style.transition = "none";

      if (video) video.pause();
    }
  }

  function startSlider() {
    showSlide(0);
  }

  function toggle(id) {
    document.getElementById(id).classList.toggle("open");
  }
</script>

</body>
</html>
