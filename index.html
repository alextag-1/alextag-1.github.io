<!DOCTYPE html>
<html>
<head>
  <title>Earth's Closet</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Helvetica, Arial, sans-serif;
    }

    body {
      overflow: hidden;
      background: black;
      color: white;
    }

    /* ENTER SCREEN */
    .enter-screen {
      position: fixed;
      inset: 0;
      background: black;
      z-index: 999;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 18px;
      transition: opacity 1.2s ease;
    }

    .enter-logo {
      width: 400px;
      opacity: 0.95;
    }

    .enter-btn {
      font-size: 12px;
      letter-spacing: 4px;
      border: 1px solid white;
      padding: 10px 18px;
      cursor: pointer;
    }

    .hidden {
      opacity: 0;
      pointer-events: none;
    }

    /* SLIDES */
    .slider {
      position: fixed;
      inset: 0;
      z-index: 1;
    }

    .slide {
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 1.5s ease;
    }

    .slide.active {
      opacity: 1;
      z-index: 2;
    }

    .slide img,
    .slide video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* PROGRESS BAR */
    .progress-container {
      position: fixed;
      bottom: 25px;
      left: 50%;
      transform: translateX(-50%);
      width: 200px;
      height: 2px;
      background: rgba(255,255,255,0.2);
      z-index: 5;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: white;
      transition: width linear;
    }

    /* OVERLAY */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 2;
    }

    /* BRAND */
    .brand {
      position: fixed;
      top: 35px;
      left: 45px;
      z-index: 3;
      letter-spacing: 6px;
      text-transform: uppercase;
    }

    .blend {
      position: fixed;
      top: 35px;
      right: 45px;
      z-index: 3;
      font-size: 11px;
      letter-spacing: 4px;
    }

  </style>
</head>

<body>

<!-- ENTER -->
<div class="enter-screen" id="enter">
  <img src="White_earth_closet_logo-removebg-preview.png" class="enter-logo">
  <div class="enter-btn" onclick="enterSite()">Enter Site</div>
</div>

<!-- SLIDES -->
<div class="slider" id="slider">

  <div class="slide active">
    <img src="image1 (4).jpg">
  </div>

  <div class="slide">
    <video muted>
      <source src="video1 (2).mp4" type="video/mp4">
    </video>
  </div>

  <div class="slide">
    <img src="image2.jpg">
  </div>

</div>

<!-- PROGRESS BAR -->
<div class="progress-container">
  <div class="progress-bar" id="progress"></div>
</div>

<div class="overlay"></div>

<div class="brand">Earth’s Closet</div>

<div class="blend">
  <a href="blend.html">Blend The Vision</a>
</div>

<script>
  function enterSite() {
    document.getElementById("enter").classList.add("hidden");
    startAuto();
  }

  let slides = document.querySelectorAll(".slide");
  let current = 0;
  let progress = document.getElementById("progress");
  let interval;
  let startX = 0;

  function showSlide(index) {

    // stop previous video
    let prevVideo = slides[current].querySelector("video");
    if (prevVideo) {
      prevVideo.pause();
      prevVideo.currentTime = 0;
    }

    slides[current].classList.remove("active");

    current = index;

    slides[current].classList.add("active");

    let video = slides[current].querySelector("video");

    if (video) {
      video.currentTime = 0;
      video.play();

      progress.style.transition = "none";
      progress.style.width = "0%";

      setTimeout(() => {
        progress.style.transition = `width ${video.duration}s linear`;
        progress.style.width = "100%";
      }, 100);

      video.onended = () => nextSlide();

    } else {
      progress.style.transition = "none";
      progress.style.width = "0%";

      setTimeout(() => {
        progress.style.transition = "width 8s linear";
        progress.style.width = "100%";
      }, 100);

      clearInterval(interval);
      interval = setTimeout(nextSlide, 8000);
    }
  }

  function nextSlide() {
    let next = (current + 1) % slides.length;
    showSlide(next);
  }

  function startAuto() {
    showSlide(0);
  }

  /* SWIPE SUPPORT */
  const slider = document.getElementById("slider");

  slider.addEventListener("touchstart", e => {
    startX = e.touches[0].clientX;
  });

  slider.addEventListener("touchend", e => {
    let endX = e.changedTouches[0].clientX;

    if (startX - endX > 50) nextSlide();
    if (endX - startX > 50) showSlide((current - 1 + slides.length) % slides.length);
  });

  /* DESKTOP DRAG */
  let isDown = false;

  slider.addEventListener("mousedown", e => {
    isDown = true;
    startX = e.clientX;
  });

  slider.addEventListener("mouseup", e => {
    if (!isDown) return;
    isDown = false;

    let diff = e.clientX - startX;

    if (diff > 50) showSlide((current - 1 + slides.length) % slides.length);
    if (diff < -50) nextSlide();
  });

</script>

</body>
</html>
