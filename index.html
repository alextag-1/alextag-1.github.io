<!DOCTYPE html>
<html>
<head>
  <title>Earth's Closet</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Helvetica, Arial, sans-serif;
    }

    body {
      height: 100vh;
      overflow: hidden;
      background: black;
      color: white;
    }

    /* BACKGROUND SLIDESHOW */
    .slider {
      position: fixed;
      inset: 0;
      z-index: 1;
    }

    .slide {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0;
      transition: opacity 2.8s ease;
      transform: scale(1.03);
    }

    .active {
      opacity: 1;
    }

    /* DARK OVERLAY */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 2;
    }

    /* CENTER CONTENT */
    .content {
      position: relative;
      z-index: 3;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      gap: 40px;
    }

    h1 {
      font-size: 30px;
      letter-spacing: 6px;
      font-weight: 300;
      text-transform: uppercase;
    }

    .sub {
      font-size: 13px;
      letter-spacing: 3px;
      opacity: 0.8;
      text-transform: uppercase;
    }

    .sub a {
      color: white;
      text-decoration: none;
      border-bottom: 1px solid rgba(255,255,255,0.3);
      padding-bottom: 3px;
      transition: 0.3s;
    }

    .sub a:hover {
      opacity: 0.5;
    }

    /* NAV */
    .nav {
      display: flex;
      flex-direction: column;
      gap: 18px;
      margin-top: 20px;
      font-size: 13px;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    .item {
      cursor: pointer;
      transition: 0.3s;
    }

    .item:hover {
      opacity: 0.5;
    }

    a {
      color: white;
      text-decoration: none;
    }

    /* DROPDOWN */
    .dropdown {
      display: none;
      flex-direction: column;
      gap: 10px;
      margin-top: 10px;
      font-size: 11px;
      letter-spacing: 2px;
    }

    .dropdown a {
      opacity: 0.6;
    }

    .dropdown a:hover {
      opacity: 1;
    }

    .open {
      display: flex;
    }

  </style>
</head>

<body>

<!-- BACKGROUND -->
<div class="slider">
  <img src="image1 (3).jpg" class="slide active">
  <img src="image2.jpg" class="slide">

  <video class="slide" autoplay muted loop>
    <source src="video1.mp4" type="video/mp4">
  </video>

  <img src="image3.jpg" class="slide">
</div>

<div class="overlay"></div>

<!-- CONTENT -->
<div class="content">

  <h1>Earth's Closet</h1>

  <div class="sub">
    <a href="blend.html">Blend The Vision</a>
  </div>

  <div class="nav">

    <div class="item" onclick="toggle('curation')">
      Curation
      <div class="dropdown" id="curation">
        <a href="https://www.ebay.com/usr/earthscloset">eBay</a>
        <a href="https://www.depop.com/earthsclosetdepop/">Depop</a>
        <a href="https://www.mercari.com/u/earthscloset/">Mercari</a>
        <a href="https://poshmark.com/closet/earths_closet">Poshmark</a>
      </div>
    </div>

    <div class="item" onclick="toggle('outlets')">
      Outlets
      <div class="dropdown" id="outlets">
        <a href="https://www.instagram.com/earths_closet_shop/">Instagram</a>
        <a href="https://tiktok.com/@yourname">TikTok</a>
        <a href="https://youtube.com/@yourname">YouTube</a>
        <a href="https://facebook.com/yourname">Facebook</a>
      </div>
    </div>

  </div>

</div>

<script>
  // SLIDESHOW
  let slides = document.querySelectorAll(".slide");
  let i = 0;

  setInterval(() => {
    slides[i].classList.remove("active");
    i = (i + 1) % slides.length;
    slides[i].classList.add("active");
  }, 5000);

  // DROPDOWN
  function toggle(id) {
    document.getElementById(id).classList.toggle("open");
  }
</script>

</body>
</html>
