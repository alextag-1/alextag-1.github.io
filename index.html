<!DOCTYPE html>
<html>
<head>
  <title>Earth's Closet</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Helvetica, Arial, sans-serif;
    }

    body {
      overflow: hidden;
      background: black;
      color: white;
    }

    /* ENTER SCREEN */
    .enter-screen {
      position: fixed;
      inset: 0;
      background: black;
      z-index: 999;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 18px;
      transition: opacity 1.2s ease;
    }

    .enter-logo {
      width: 400px;
    }

    .enter-title {
      font-size: 18px;
      letter-spacing: 6px;
      text-transform: uppercase;
    }

    .enter-btn {
      font-size: 12px;
      letter-spacing: 4px;
      border: 1px solid white;
      padding: 10px 18px;
      cursor: pointer;
    }

    .hidden {
      opacity: 0;
      pointer-events: none;
    }

    /* SLIDES */
    .slider {
      position: fixed;
      inset: 0;
      z-index: 1;
    }

    .slide {
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 2s ease;
    }

    .slide.active {
      opacity: 1;
      z-index: 2;
    }

    .slide img,
    .slide video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 2;
    }

    .brand {
      position: fixed;
      top: 35px;
      left: 45px;
      z-index: 3;
      font-size: 18px;
      letter-spacing: 6px;
      text-transform: uppercase;
    }

    .blend {
      position: fixed;
      top: 35px;
      right: 45px;
      z-index: 3;
      font-size: 13px;
      letter-spacing: 5px;
    }

    /* NAV */
    .nav {
      position: fixed;
      top: 80px;
      right: 45px;
      z-index: 3;
      display: flex;
      flex-direction: column;
      gap: 18px;
      text-align: right;
      font-size: 12px;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    .item {
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
    }

    /* HEADER ROW */
    .item-header {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* FIXED ARROW (NO SIZE CHANGE EVER) */
    .arrow {
      display: inline-block;
      transition: transform 0.35s ease;
      transform-origin: center;
    }

    .item.open .arrow {
      transform: rotate(90deg);
    }

    /* DROPDOWN SMOOTH SLIDE */
    .dropdown {
      max-height: 0;
      overflow: hidden;
      opacity: 0;
      transform: translateY(-6px);
      transition: max-height 0.35s ease, opacity 0.35s ease, transform 0.35s ease;
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 10px;
      font-size: 11px;
    }

    .item.open .dropdown {
      max-height: 200px;
      opacity: 1;
      transform: translateY(0);
    }

    .dropdown a {
      color: rgba(255,255,255,0.5);
      transition: 0.3s;
    }

    .dropdown a:hover {
      color: white;
    }

    a {
      color: white;
      text-decoration: none;
    }

    /* CONTROLS (FIXED JITTER) */
    .controls {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 5;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .progress-container {
      width: 220px;
      height: 2px;
      background: rgba(255,255,255,0.2);
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: white;
    }

    .buttons {
      display: flex;
      gap: 20px;
      font-size: 18px;
      user-select: none;
    }

    /* FIX: no vertical shift ever */
    .buttons div {
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      cursor: pointer;
      transition: transform 0.2s ease;
    }

    /* PLAY BUTTON ANIMATION (NO SHAPE JUMP) */
    .play {
      position: relative;
    }

    .play::before,
    .play::after {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.25s ease, transform 0.25s ease;
    }

    .play.playing::before {
      content: "⏸";
      opacity: 1;
      transform: scale(1);
    }

    .play.playing::after {
      content: "▶";
      opacity: 0;
      transform: scale(0.7);
    }

    .play:not(.playing)::before {
      content: "⏸";
      opacity: 0;
      transform: scale(0.7);
    }

    .play:not(.playing)::after {
      content: "▶";
      opacity: 1;
      transform: scale(1);
    }
    .headline {
  position: fixed;
  top: 120px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 3;
  text-align: center;
  pointer-events: none;
}

.line1 {
  font-size: 18px;
  letter-spacing: 4px;
  text-transform: uppercase;
  margin-bottom: 10px;
}

.line2 {
  font-size: 12px;
  letter-spacing: 3px;
  opacity: 0.7;
}

  </style>
</head>

<body>

<div class="enter-screen" id="enter">
  <img src="White_earth_closet_logo-removebg-preview.png" class="enter-logo">
  <div class="enter-title">Earth’s Closet</div>
  <div class="enter-btn" onclick="enterSite()">Enter Site</div>
</div>

<div class="slider">

 <div class="slide active">
  <video muted playsinline preload="auto">
    <source src="Untitled design (1).mp4" type="video/mp4">
  </video>
</div>

  <div class="slide">
    <video muted playsinline preload="auto">
      <source src="video1 (2).mp4" type="video/mp4">
    </video>
  </div>

  <div class="slide">
    <img src="image3.jpg">
  </div>

</div>

<div class="overlay"></div>
  <div class="headline">
  <div class="line1">HUNDREDS OF CURATED PIECES</div>
  <div class="line2">CARRYING RALPH LAUREN, NIKE, ESSENTIALS, AND MANY MORE</div>
</div>
  
<div class="brand">Earth’s Closet</div>

<div class="blend">
  <a href="blend.html">Blend The Vision</a>
</div>

<div class="nav">

  <div class="item">
    <div class="item-header" onclick="toggle(this)">
      Curation <span class="arrow">></span>
    </div>

    <div class="dropdown">
      <a href="https://www.ebay.com/usr/earthscloset">eBay</a>
      <a href="https://www.depop.com/earthsclosetdepop/">Depop</a>
      <a href="https://www.mercari.com/u/earthscloset/">Mercari</a>
      <a href="https://poshmark.com/closet/earths_closet">Poshmark</a>
    </div>
  </div>

  <div class="item">
    <div class="item-header" onclick="toggle(this)">
      Outlets <span class="arrow">></span>
    </div>

    <div class="dropdown">
      <a href="https://www.instagram.com/earths_closet_shop/">Instagram</a>
      <a href="https://tiktok.com/@yourname">TikTok</a>
      <a href="https://youtube.com/@yourname">YouTube</a>
      <a href="https://facebook.com/yourname">Facebook</a>
    </div>
  </div>

</div>

<div class="controls">

  <div class="buttons">
    <div onclick="prevSlide()">&#8592;</div>

    <div id="playBtn" class="play playing" onclick="togglePlay()"></div>

    <div onclick="nextSlide()">&#8594;</div>
  </div>

  <div class="progress-container">
    <div class="progress-bar" id="progress"></div>
  </div>

</div>

<script>
  function enterSite() {
    document.getElementById("enter").classList.add("hidden");
    showSlide(0);
  }

  let slides = document.querySelectorAll(".slide");
  let current = 0;
  let progress = document.getElementById("progress");
  let timer;
  let playing = true;

  let startTime = 0;
  let remaining = 0;

  function showSlide(index) {

    clearTimeout(timer);

    let prevVideo = slides[current].querySelector("video");
    if (prevVideo) {
      prevVideo.pause();
      prevVideo.currentTime = 0;
    }

    slides[current].classList.remove("active");
    current = index;
    slides[current].classList.add("active");

    let video = slides[current].querySelector("video");

    let duration = video && video.duration ? video.duration : 10;
    remaining = duration * 1000;

    progress.style.transition = "none";
    progress.style.width = "0%";

    setTimeout(() => {

      if (!playing) return;

      if (video) video.play();

      startTime = Date.now();

      progress.style.transition = `width ${duration}s linear`;
      progress.style.width = "100%";

      timer = setTimeout(nextSlide, remaining);

    }, 80);
  }

  function nextSlide() {
    showSlide((current + 1) % slides.length);
  }

  function prevSlide() {
    showSlide((current - 1 + slides.length) % slides.length);
  }

  function togglePlay() {
    playing = !playing;

    document.getElementById("playBtn").classList.toggle("playing");

    let video = slides[current].querySelector("video");

    if (!playing) {
      clearTimeout(timer);

      if (video) video.pause();

      // calculate remaining time
      let elapsed = Date.now() - startTime;
      remaining = Math.max(remaining - elapsed, 0);

      // freeze progress exactly where it is
      let percent = (elapsed / (elapsed + remaining)) * 100;
      progress.style.transition = "none";
      progress.style.width = percent + "%";

    } else {

      let video = slides[current].querySelector("video");

      if (video) video.play();

      startTime = Date.now();

      progress.style.transition = `width ${remaining/1000}s linear`;
      progress.style.width = "100%";

      timer = setTimeout(nextSlide, remaining);
    }
  }

  function toggle(el) {
    el.parentElement.classList.toggle("open");
  }
</script>

</body>
</html>
