<!DOCTYPE html>
<html>
<head>
  <title>Earth's Closet</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Helvetica, Arial, sans-serif;
    }

    body {
      height: 100vh;
      overflow: hidden;
      background: black;
      color: white;
      opacity: 0;
      animation: fadeIn 1.2s ease forwards;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    /* BACKGROUND SLIDESHOW */
    .slider {
      position: fixed;
      inset: 0;
      z-index: 1;
    }

    .slide {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0;
      transform: scale(1.05);
      transition: opacity 2.5s ease, transform 6s ease;
    }

    .active {
      opacity: 1;
      transform: scale(1);
    }

    /* DARK OVERLAY */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 2;
    }

    /* BRAND (TOP LEFT) */
    .brand {
      position: fixed;
      top: 35px;
      left: 45px;
      z-index: 3;
      font-size: 18px;
      letter-spacing: 6px;
      font-weight: 300;
      text-transform: uppercase;
      opacity: 0.95;
    }

    /* SUB LINK */
    .sub {
      position: fixed;
      top: 65px;
      left: 45px;
      z-index: 3;
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      opacity: 0.7;
    }

    .sub a {
      color: white;
      text-decoration: none;
      border-bottom: 1px solid rgba(255,255,255,0.3);
      padding-bottom: 2px;
      transition: 0.3s;
    }

    .sub a:hover {
      opacity: 0.5;
    }

    /* NAV (TOP RIGHT) */
    .nav {
      position: fixed;
      top: 35px;
      right: 45px;
      z-index: 3;
      display: flex;
      flex-direction: column;
      gap: 22px;
      text-align: right;
      font-size: 12px;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    .item {
      cursor: pointer;
      transition: 0.3s;
      position: relative;
    }

    .item:hover {
      opacity: 0.5;
    }

    a {
      color: white;
      text-decoration: none;
    }

    /* DROPDOWN */
    .dropdown {
      display: none;
      flex-direction: column;
      gap: 10px;
      margin-top: 10px;
      font-size: 11px;
      letter-spacing: 2px;
    }

    .dropdown a {
      opacity: 0.6;
      transition: 0.2s;
    }

    .dropdown a:hover {
      opacity: 1;
    }

    .open {
      display: flex;
    }

    /* HOVER PREVIEW BOX */
    .preview {
      position: fixed;
      width: 180px;
      height: 120px;
      background-size: cover;
      background-position: center;
      border: 1px solid rgba(255,255,255,0.2);
      pointer-events: none;
      opacity: 0;
      z-index: 10;
      transition: opacity 0.2s ease;
    }

  </style>
</head>

<body>

<!-- BACKGROUND -->
<div class="slider">
  <img src="image1.jpg" class="slide active">
  <img src="image2.jpg" class="slide">

  <video class="slide" autoplay muted loop>
    <source src="video1.mp4" type="video/mp4">
  </video>

  <img src="image3.jpg" class="slide">
</div>

<div class="overlay"></div>

<!-- BRAND -->
<div class="brand">Earth’s Closet</div>

<!-- SUB -->
<div class="sub">
  <a href="blend.html">Blend The Vision</a>
</div>

<!-- NAV -->
<div class="nav">

  <div class="item" onclick="toggle('curation')" data-preview="image1.jpg">
    Curation
    <div class="dropdown" id="curation">
      <a href="https://www.ebay.com/usr/earthscloset">eBay</a>
      <a href="https://www.depop.com/earthsclosetdepop/">Depop</a>
      <a href="https://www.mercari.com/u/earthscloset/">Mercari</a>
      <a href="https://poshmark.com/closet/earths_closet">Poshmark</a>
    </div>
  </div>

  <div class="item" onclick="toggle('outlets')" data-preview="image2.jpg">
    Outlets
    <div class="dropdown" id="outlets">
      <a href="https://www.instagram.com/earths_closet_shop/">Instagram</a>
      <a href="https://tiktok.com/@yourname">TikTok</a>
      <a href="https://youtube.com/@yourname">YouTube</a>
      <a href="https://facebook.com/yourname">Facebook</a>
    </div>
  </div>

</div>

<!-- PREVIEW BOX -->
<div class="preview" id="preview"></div>

<script>
  /* SLIDESHOW */
  let slides = document.querySelectorAll(".slide");
  let i = 0;

  setInterval(() => {
    slides[i].classList.remove("active");
    i = (i + 1) % slides.length;
    slides[i].classList.add("active");
  }, 5500);

  /* DROPDOWNS */
  function toggle(id) {
    document.getElementById(id).classList.toggle("open");
  }

  /* HOVER PREVIEW */
  const preview = document.getElementById("preview");
  const items = document.querySelectorAll(".item");

  items.forEach(el => {
    el.addEventListener("mousemove", (e) => {
      const img = el.getAttribute("data-preview");
      if (!img) return;

      preview.style.backgroundImage = `url(${img})`;
      preview.style.left = e.clientX + 20 + "px";
      preview.style.top = e.clientY + 20 + "px";
      preview.style.opacity = 1;
    });

    el.addEventListener("mouseleave", () => {
      preview.style.opacity = 0;
    });
  });
</script>

</body>
</html>
